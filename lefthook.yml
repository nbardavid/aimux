pre-commit:
  parallel: true
  commands:
    lint:
      run: bunx oxlint --fix {staged_files}
      glob: '*.{ts,tsx}'
    format-check:
      run: bunx oxfmt --write {staged_files}
      glob: '*.{ts,tsx,json}'

pre-push:
  parallel: true
  commands:
    lint:
      run: bun run lint
    format:
      run: bun run format
    typecheck:
      run: bun run check
    test:
      run: bun test
